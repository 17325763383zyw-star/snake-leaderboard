<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>炫酷狂拽zyw设计的贪吃蛇</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body class="min-h-screen text-slate-100 flex items-center justify-center p-4">
  <div class="w-full max-w-7xl grid gap-6 xl:grid-cols-[360px_1fr_360px]">
    <section class="panel p-6">
      <div class="flex items-center gap-3 mb-4">
        <div class="w-12 h-12 rounded-2xl bg-emerald-500/20 flex items-center justify-center text-emerald-400 text-2xl">
          <i class="fa fa-gamepad"></i>
        </div>
        <div class="flex-1">
          <h1 class="text-2xl font-bold tracking-wide">炫酷狂拽zyw设计的贪吃蛇</h1>
          <p class="text-sm text-slate-300">所有人都能看到你的成绩</p>
        </div>
        <div id="musicIndicator" class="hidden items-center gap-2 px-3 py-2 rounded-xl bg-emerald-500/10 border border-emerald-500/20">
          <div class="flex gap-1">
            <span class="w-1 h-3 bg-emerald-400 rounded-full animate-pulse"></span>
            <span class="w-1 h-4 bg-emerald-400 rounded-full animate-pulse" style="animation-delay: 0.1s"></span>
            <span class="w-1 h-2 bg-emerald-400 rounded-full animate-pulse" style="animation-delay: 0.2s"></span>
          </div>
          <span class="text-xs text-emerald-400">音乐播放中</span>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4 mb-5">
        <div class="stat-card">
          <p class="stat-label">当前分数</p>
          <p id="score" class="stat-value text-emerald-400">0</p>
        </div>
        <div class="stat-card">
          <p class="stat-label">本机最高</p>
          <p id="best" class="stat-value text-amber-400">0</p>
        </div>
      </div>

      <div class="space-y-3 mb-5 text-sm leading-6 text-slate-300">
        <p><span class="text-white font-semibold">操作：</span>方向键 / WASD 控制移动</p>
        <p><span class="text-white font-semibold">快捷键：</span>空格暂停，Enter 重新开始</p>
        <p><span class="text-white font-semibold">说明：</span>游戏结束后可提交你的 ID 和分数</p>
      </div>

      <div class="flex gap-3 mb-5">
        <button id="startBtn" class="primary-btn flex-1">开始游戏</button>
        <button id="pauseBtn" class="secondary-btn flex-1">暂停</button>
      </div>

      <div class="grid grid-cols-3 gap-3 max-w-[220px] mx-auto select-none mb-5">
        <div></div>
        <button data-dir="up" class="control-btn">
          <i class="fa fa-chevron-up"></i>
        </button>
        <div></div>
        <button data-dir="left" class="control-btn">
          <i class="fa fa-chevron-left"></i>
        </button>
        <button data-dir="down" class="control-btn">
          <i class="fa fa-chevron-down"></i>
        </button>
        <button data-dir="right" class="control-btn">
          <i class="fa fa-chevron-right"></i>
        </button>
      </div>

      <div class="rounded-2xl bg-slate-900/60 border border-white/10 p-4 space-y-3">
        <div>
          <label for="playerIdInput" class="block text-sm text-slate-300 mb-2">你的 ID</label>
          <input id="playerIdInput" type="text" maxlength="20" placeholder="例如：zhuyawen" class="w-full rounded-xl bg-slate-950/70 border border-white/10 px-4 py-3 text-white outline-none focus:border-emerald-400" />
        </div>
        <div class="flex items-center justify-between">
          <label class="text-sm text-slate-300">音效</label>
          <input id="soundToggle" type="checkbox" checked class="w-5 h-5 rounded accent-emerald-500 cursor-pointer" />
        </div>
        <p class="text-xs text-slate-400">提交成绩时会使用这个 ID，并保存在本地浏览器中。</p>
      </div>
    </section>

    <section class="panel p-4 md:p-6">
      <div class="relative mx-auto w-full max-w-[700px] aspect-square rounded-3xl overflow-hidden border border-emerald-500/20 bg-[#06121d]">
        <canvas id="game" width="600" height="600" class="w-full h-full"></canvas>
        <div id="overlay" class="absolute inset-0 bg-slate-950/60 backdrop-blur-sm flex flex-col items-center justify-center text-center px-6">
          <p id="overlayTitle" class="text-3xl md:text-4xl font-bold mb-3">准备开始</p>
          <p id="overlayText" class="text-slate-200 max-w-md mb-5">点击“开始游戏”或按 Enter，冲击排行榜。</p>
          <div id="submitPanel" class="hidden w-full max-w-sm rounded-2xl bg-slate-950/80 border border-white/10 p-4 space-y-3">
            <p class="text-sm text-slate-300">本局结束后可提交成绩到云端排行榜。</p>
            <button id="submitScoreBtn" class="primary-btn w-full">提交成绩</button>
            <p id="submitStatus" class="text-sm text-slate-300 min-h-[20px]"></p>
          </div>
        </div>
      </div>
    </section>

    <section class="panel p-6">
      <div class="flex items-center justify-between mb-4">
        <div>
          <h2 class="text-xl font-bold">实时排行榜</h2>
          <p class="text-sm text-slate-400">每个 ID 只显示最高分，通常会自动更新</p>
        </div>
        <button id="refreshLeaderboardBtn" class="secondary-btn px-4 py-2 text-sm flex-none">刷新</button>
      </div>

      <div class="rounded-2xl bg-slate-900/60 border border-white/10 overflow-hidden">
        <div class="grid grid-cols-[56px_1fr_72px] gap-3 px-4 py-3 text-xs uppercase tracking-wide text-slate-400 border-b border-white/10">
          <span>排名</span>
          <span>ID</span>
          <span class="text-right">分数</span>
        </div>
        <div id="leaderboardStatus" class="px-4 py-6 text-sm text-slate-400">正在加载排行榜...</div>
        <div id="leaderboardList" class="hidden"></div>
      </div>

    </section>
  </div>

  <audio id="backgroundMusic" loop preload="auto">
    <source src="https://cdn.pixabay.com/audio/2022/03/24/audio_c8c8a73467.mp3" type="audio/mpeg">
    <source src="https://cdn.pixabay.com/audio/2022/01/18/audio_d0a13f69d2.mp3" type="audio/mpeg">
  </audio>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script>window.FIREBASE_CONFIG = window.FIREBASE_CONFIG || {};</script>
  <script src="./config.js"></script>
  <script src="./firebase.js"></script>
  <script src="./game.js"></script>
</body>
</html>
